name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beverage_ordering_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d beverage_ordering_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        env:
          NODE_ENV: test
        run: npm run test:e2e -- --runInBand

      - name: Build
        run: npm run build

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request?.head?.ref ?? context.ref.replace('refs/heads/', '');
            const prNumber = context.payload.pull_request?.number;
            const title = `CI failed on ${branch}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const prLine = prNumber ? `- Pull request: #${prNumber}` : '';
            const label = 'ci-failure';

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd73a4a',
                description: 'Created automatically when CI fails',
              });
            }

            const { data: existingIssues } = await github.rest.search.issuesAndPullRequests({
              q: [
                `repo:${context.repo.owner}/${context.repo.repo}`,
                'is:issue',
                'is:open',
                `label:${label}`,
                `in:title "${title}"`,
              ].join(' '),
            });

            if (existingIssues.total_count > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.items[0].number,
                body: [
                  'CI failed again.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${commitUrl}`,
                  prLine,
                ].filter(Boolean).join('\n'),
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: [label],
              body: [
                'CI failed and needs attention.',
                '',
                `- Workflow run: ${runUrl}`,
                `- Commit: ${commitUrl}`,
                `- Branch: ${branch}`,
                prLine,
              ].filter(Boolean).join('\n'),
            });
