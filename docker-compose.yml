services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beverage_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DATABASE_URL: postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_DATABASE:-beverage_ordering}
      UPLOAD_DIR: /app/uploads
      RUN_DB_SEED: ${RUN_DB_SEED:-true}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: beverage_ui
    restart: always
    ports:
      - '${UI_PORT:-5173}:80'
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: beverage_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-beverage_ordering}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-beverage_ordering}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb
    container_name: beverage_pgweb
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_DATABASE:-beverage_ordering}?sslmode=disable
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
